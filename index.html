<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>富淮理財旗艦版</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --gold: #d4af37; --navy: #002b36; }
        body { margin: 0; background: var(--navy); overflow: hidden; font-family: "PingFang TC", sans-serif; }
        
        /* 專業毛玻璃 UI */
        .glass-ui {
            position: absolute; top: 50px; left: 20px; right: 20px; padding: 25px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); z-index: 100;
            color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .brand-name { color: var(--gold); font-weight: bold; font-size: 24px; letter-spacing: 1px; }
        .status-text { margin: 10px 0; font-size: 18px; opacity: 0.9; }
        
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37, #b8860b); color: white; 
            border: none; padding: 18px; border-radius: 15px; width: 100%; 
            font-weight: bold; font-size: 18px; margin-top: 15px; 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        /* 右下角 PDF 按鈕 */
        .pdf-btn { 
            position: absolute; bottom: 40px; right: 25px; 
            background: #ff3b30; width: 70px; height: 70px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 14px; font-weight: bold; z-index: 100;
            box-shadow: 0 5px 20px rgba(255, 59, 48, 0.4);
        }
        
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="app-content">
        <div class="glass-ui">
            <div class="brand-name">富淮團隊 | 數位旗艦工具</div>
            <div id="status" class="status-text">累積資產：$0</div>
            <button class="btn-gold" 
                    onmousedown="isPress=true" onmouseup="isPress=false" 
                    ontouchstart="isPress=true" ontouchend="isPress=false">
                長按投入本金
            </button>
        </div>
        <canvas id="cvs"></canvas>
    </div>

    <div class="pdf-btn" onclick="makePDF()">生成<br>建議書</div>

    <script>
        // 註冊離線服務
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        let coins = [], isPress = false;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', init);
        init();

        class Coin {
            constructor() {
                this.r = 12;
                this.x = Math.random() * (canvas.width - 60) + 30;
                this.y = -20;
                this.vy = 8;
                this.isStatic = false;
                this.color = Math.random() > 0.5 ? '#d4af37' : '#ffd700';
            }
            update() {
                if (this.isStatic) return;
                this.y += this.vy;
                
                // 碰到地面
                if (this.y >= canvas.height - this.r) {
                    this.y = canvas.height - this.r;
                    this.isStatic = true;
                }
                
                // 碰撞堆疊偵測
                for (let o of coins) {
                    if (o === this || !o.isStatic) continue;
                    let d = Math.sqrt((this.x - o.x)**2 + (this.y - o.y)**2);
                    if (d < this.r * 2) {
                        this.isStatic = true;
                        this.y = o.y - (this.r * 1.6); // 讓堆疊看起來更緊湊
                        break;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                let g = ctx.createRadialGradient(this.x-3, this.y-3, 2, this.x, this.y, this.r);
                g.addColorStop(0, '#fffce0');
                g.addColorStop(1, this.color);
                ctx.fillStyle = g;
                ctx.fill();
                ctx.closePath();
            }
        }

        // 強大版 PDF 生成函數
        async function makePDF() {
            const statusDiv = document.getElementById('status');
            const originalText = statusDiv.innerText;
            
            try {
                alert("正在準備您的專屬建議書，請稍候...");
                
                // 截取整個網頁畫面
                const captureElement = document.getElementById('app-content');
                const canvasImg = await html2canvas(captureElement, {
                    backgroundColor: '#002b36',
                    scale: 2 // 提升畫質
                });
                
                const imgData = canvasImg.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvasImg.height * pdfWidth) / canvasImg.width;

                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`富淮團隊_理財建議書_${new Date().getTime()}.pdf`);
                
                alert("✨ 建議書生成成功！");
            } catch (err) {
                console.error(err);
                alert("生成失敗，請確認是否已給予下載權限。");
            }
        }

        function anim() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (isPress && Math.random() > 0.8) {
                coins.push(new Coin());
                document.getElementById('status').innerText = `累積資產：$${(coins.length * 10).toLocaleString()} 萬`;
            }
            // 限制金幣數量以維持效能
            if (coins.length > 350) coins.shift();
            
            coins.forEach(c => {
                c.update();
                c.draw();
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
